<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Magic PDF Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #13132a;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    background: linear-gradient(135deg, #1a1a4e 0%, #2d2d7a 100%);
    padding: 35px 20px 30px;
    text-align: center;
    border-bottom: 3px solid #4f46e5;
  }

  .header h1 {
    color: #ffd700;
    font-size: 2.2em;
    font-style: italic;
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 0 0 30px rgba(255,215,0,0.4);
  }

  .header p {
    color: #9999cc;
    font-size: 0.75em;
    letter-spacing: 4px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    margin: 20px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .label {
    font-weight: 700;
    color: #222;
    display: block;
    margin-bottom: 10px;
    font-size: 1em;
  }

  #topicInput {
    width: 100%;
    padding: 14px 18px;
    border: 2.5px solid #4f46e5;
    border-radius: 10px;
    font-size: 1em;
    outline: none;
    margin-bottom: 20px;
    transition: border-color 0.2s;
    color: #222;
  }

  #topicInput:focus { border-color: #7c3aed; }

  .btn-generate {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1em;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.1s, opacity 0.2s;
    box-shadow: 0 4px 16px rgba(79,70,229,0.4);
  }

  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-download {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1em;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(22,163,74,0.4);
    transition: transform 0.1s;
  }

  .btn-download:active { transform: scale(0.98); }

  .progress-section {
    text-align: center;
    padding: 10px 0 5px;
  }

  .timer-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 5px solid #e5e7eb;
    border-top-color: #4f46e5;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5em;
    font-weight: 800;
    color: #4f46e5;
    margin-bottom: 14px;
    animation: spin-border 1s linear infinite;
    position: relative;
  }

  @keyframes spin-border {
    to { transform: rotate(360deg); }
  }

  .timer-inner {
    position: absolute;
    animation: spin-border 1s linear infinite reverse;
  }

  .progress-bar-bg {
    background: #e5e7eb;
    border-radius: 10px;
    height: 10px;
    margin: 0 0 14px;
    overflow: hidden;
  }

  .progress-bar-fill {
    background: linear-gradient(90deg, #4f46e5, #7c3aed);
    height: 10px;
    border-radius: 10px;
    width: 0%;
    transition: width 0.8s ease;
  }

  .status-main {
    color: #4f46e5;
    font-weight: 700;
    font-size: 0.95em;
    margin-bottom: 4px;
  }

  .status-sub {
    color: #999;
    font-size: 0.82em;
    font-style: italic;
  }

  .ready-badge {
    color: #16a34a;
    font-weight: 700;
    font-size: 0.95em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .preview-card {
    background: #fff;
    border: 3px solid #4f46e5;
    border-radius: 16px;
    padding: 22px;
    margin: 0 16px 20px;
    box-shadow: 0 8px 32px rgba(79,70,229,0.15);
  }

  .preview-title {
    color: #4f46e5;
    font-size: 1.1em;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .preview-divider {
    border: none;
    border-top: 2px solid #e5e7eb;
    margin-bottom: 14px;
  }

  .preview-content {
    color: #444;
    line-height: 1.75;
    font-size: 0.93em;
  }

  .preview-content h3 {
    color: #4f46e5;
    margin: 14px 0 6px;
    font-size: 1em;
  }

  .error-msg {
    background: #fef2f2;
    color: #dc2626;
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.9em;
    margin-top: 12px;
  }

  .placeholder-text {
    color: #aaa;
    font-style: italic;
    text-align: center;
    padding: 20px 0;
    font-size: 0.9em;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>✨ MAGIC PDF PRO</h1>
  <p>Created by MR. MEHUL</p>
</div>

<!-- Main card -->
<div class="card">
  <label class="label">Enter Topic (Title):</label>
  <input type="text" id="topicInput" placeholder="Ex: Dr BR Ambedkar" />

  <!-- Generate button -->
  <button class="btn-generate" id="generateBtn" onclick="startGenerate()">
    ✨ &nbsp;WRITE DETAILED DOCUMENT
  </button>

  <!-- Progress section (hidden initially) -->
  <div class="progress-section" id="progressSection" style="display:none;">
    <div class="timer-circle">
      <span class="timer-inner" id="timerDisplay">0s</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <p class="status-main" id="statusMain">Processing your request...</p>
    <p class="status-sub" id="statusSub">Mehul's Engine is writing beautiful full pages...</p>
  </div>

  <!-- Download section (hidden initially) -->
  <div id="downloadSection" style="display:none;">
    <div class="ready-badge">✨ Premium Dynamic PDF Document Ready</div>
    <button class="btn-download" onclick="downloadPDF()">
      ⬇ &nbsp;DOWNLOAD PDF DIRECTLY
    </button>
  </div>

  <!-- Error -->
  <div id="errorMsg" class="error-msg" style="display:none;"></div>
</div>

<!-- Preview card -->
<div class="preview-card" id="previewCard">
  <div class="preview-title">Document Preview</div>
  <hr class="preview-divider">
  <div class="preview-content">
    <p class="placeholder-text">Your live generated full page document content will show up here after processing...</p>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

let pdfDoc = null;
let correctedTitle = '';
let timerInterval = null;
let elapsedSeconds = 0;

// ─── Entry point ─────────────────────────────────────────────────────────────
async function startGenerate() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) { showError('Please enter a topic first!'); return; }

  hideError();
  resetUI();

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('generateBtn').style.display = 'none';
  document.getElementById('progressSection').style.display = 'block';

  startTimer();

  try {
    setStatus('Correcting spelling & analyzing topic...', 'AI is reading your request...');
    const content = await generateContentViaClaude(topic);
    correctedTitle = content.correctedTitle;

    setStatus('Fetching images from internet...', 'Downloading HD illustrations...');
    const images = await fetchImages(content);

    setStatus('Building PDF pages...', 'Creating your premium document...');
    pdfDoc = await buildPDF(content, images);

    setStatus('Done!', 'Your PDF is ready.');
    stopTimer();

    document.getElementById('progressSection').style.display = 'none';
    document.getElementById('downloadSection').style.display = 'block';
    showPreview(content);

  } catch (err) {
    stopTimer();
    document.getElementById('progressSection').style.display = 'none';
    document.getElementById('generateBtn').style.display = 'block';
    document.getElementById('generateBtn').disabled = false;
    showError('Something went wrong: ' + err.message + '. Please try again.');
    console.error(err);
  }
}

// ─── Timer ────────────────────────────────────────────────────────────────────
function startTimer() {
  elapsedSeconds = 0;
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    document.getElementById('timerDisplay').textContent = elapsedSeconds + 's';
    const pct = Math.min((elapsedSeconds / 25) * 90, 90);
    document.getElementById('progressFill').style.width = pct + '%';
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('progressFill').style.width = '100%';
}

function setStatus(main, sub) {
  document.getElementById('statusMain').textContent = main;
  document.getElementById('statusSub').textContent = sub;
}

// ─── Claude API ───────────────────────────────────────────────────────────────
async function generateContentViaClaude(topic) {
  const prompt = `You are an expert document writer. The user's topic is: "${topic}"

IMPORTANT:
1. First auto-correct any spelling mistakes in the topic.
2. Write a comprehensive, informative 6-page PDF document in English.
3. Return ONLY raw valid JSON — no markdown, no backticks, no extra text.

JSON format:
{
  "correctedTitle": "Properly spelled and formatted topic title",
  "subtitle": "One descriptive subtitle line",
  "introduction": "A detailed introduction of at least 250 words covering background, importance, and overview.",
  "sections": [
    {
      "title": "Section heading",
      "content": "At least 200 words of detailed, informative content for this section.",
      "imageQuery": "simple 1-3 word search term for a relevant photo"
    },
    { "title": "...", "content": "...", "imageQuery": "..." },
    { "title": "...", "content": "...", "imageQuery": "..." },
    { "title": "...", "content": "...", "imageQuery": "..." },
    { "title": "...", "content": "...", "imageQuery": "..." }
  ],
  "keyFacts": [
    "Important fact 1 (one sentence)",
    "Important fact 2",
    "Important fact 3",
    "Important fact 4",
    "Important fact 5",
    "Important fact 6"
  ],
  "conclusion": "A detailed conclusion of at least 150 words summarizing insights and future outlook."
}`;

  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic: prompt })
  });

  if (!res.ok) throw new Error('API call failed: ' + res.status);
  const data = await res.json();
  
  let raw = '';
  if (data.content && data.content[0] && data.content[0].text) {
    raw = data.content[0].text;
  } else if (data.text) {
    raw = data.text;
  }
  
  if (!raw) throw new Error('No JSON returned from AI');
  
  const cleaned = raw.replace(/```json|```/g, '').trim();
  const jsonStart = cleaned.indexOf('{');
  const jsonEnd = cleaned.lastIndexOf('}');
  if (jsonStart === -1) throw new Error('No JSON returned from AI');
  
  try {
    return JSON.parse(cleaned.slice(jsonStart, jsonEnd + 1));
  } catch(e) {
    throw new Error('JSON parse error: ' + e.message);
  }
}

// ─── Image fetching (PARALLEL for speed) ─────────────────────────────────────
async function fetchImages(content) {
  try {
    const queries = [
      (content.sections && content.sections[0]?.imageQuery) || content.correctedTitle || 'nature',
      (content.sections && content.sections[1]?.imageQuery) || content.correctedTitle || 'science',
      (content.sections && content.sections[2]?.imageQuery) || content.correctedTitle || 'technology',
      content.correctedTitle || 'document',
    ];
    // Fetch all images at the same time (parallel)
    const results = await Promise.allSettled(
      queries.map((q, i) => loadImageAsBase64(q, i))
    );
    return results.map(r => r.status === 'fulfilled' ? r.value : null);
  } catch(e) {
    return [null, null, null, null];
  }
}

async function loadImageAsBase64(query, seed) {
  // Use multiple sources for topic-specific images
  const cleanQuery = encodeURIComponent(query.toLowerCase().trim());
  
  const sources = [
    // Unsplash source (topic specific)
    `https://source.unsplash.com/featured/700x350/?${cleanQuery}`,
    // Picsum with topic seed (fallback)
    `https://picsum.photos/seed/${cleanQuery}${seed}/700/350`,
  ];

  for (const url of sources) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const blob = await res.blob();
      if (blob.size < 1000) continue; // skip tiny/broken images
      return await blobToBase64(blob);
    } catch { continue; }
  }
  return null;
}

function blobToBase64(blob) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

// ─── PDF builder ──────────────────────────────────────────────────────────────
async function buildPDF(content, images) {
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, H = 297, M = 18, CW = W - M * 2;
  const PURPLE = [79, 70, 229];
  const DARK = [20, 20, 40];
  const GRAY = [110, 110, 110];
  const LIGHT_GRAY = [245, 245, 250];

  // ── Page 1: Cover ─────────────────────────────────────────────────────────
  // Header band
  doc.setFillColor(...PURPLE);
  doc.rect(0, 0, W, 55, 'F');

  // Cover image (top right decorative)
  if (images[0]) {
    try { doc.addImage(images[0], 'JPEG', W/2, 0, W/2, 55); } catch {}
    // Re-apply purple overlay strip
    doc.setFillColor(...PURPLE);
    doc.setGState && doc.setGState(new doc.GState({ opacity: 0.6 }));
    doc.rect(0, 0, W/2, 55, 'F');
  }

  // Title text on cover
  doc.setTextColor(255, 215, 0);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  const titleLines = doc.splitTextToSize(content.correctedTitle.toUpperCase(), CW);
  doc.text(titleLines, M, 22);

  doc.setTextColor(200, 200, 255);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'italic');
  doc.text(content.subtitle || 'A Comprehensive Document', M, 42);

  doc.setTextColor(160, 160, 200);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  doc.text('Generated by Magic PDF Pro  •  ' + new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }), M, 50);

  // Introduction section
  let y = 65;
  y = drawSectionHeading(doc, 'INTRODUCTION', y, M, CW, PURPLE);

  doc.setTextColor(...DARK);
  doc.setFontSize(10.5);
  doc.setFont('helvetica', 'normal');
  const introLines = doc.splitTextToSize(content.introduction, CW);
  const page1Lines = introLines.slice(0, 30);
  doc.text(page1Lines, M, y);
  y += page1Lines.length * 5.5 + 8;

  // Remaining intro on page if space
  const remainIntro = introLines.slice(30);
  if (remainIntro.length > 0 && y + remainIntro.length * 5.5 < H - 18) {
    doc.text(remainIntro, M, y);
  }

  addFooter(doc, 1, content.correctedTitle, W, H, M, PURPLE);

  // ── Pages 2–6: Content Sections ──────────────────────────────────────────
  for (let i = 0; i < content.sections.length; i++) {
    doc.addPage();
    const sec = content.sections[i];
    let sy = M;

    // Top strip
    doc.setFillColor(...PURPLE);
    doc.rect(0, 0, W, 12, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text(content.correctedTitle.toUpperCase(), M, 8);
    doc.text(`Page ${i + 2}`, W - M, 8, { align: 'right' });

    sy = 22;

    // Section heading
    sy = drawSectionHeading(doc, sec.title.toUpperCase(), sy, M, CW, PURPLE);

    // Image FULL WIDTH at top (stack layout)
    const img = (images && images.length > i && images[i]) ? images[i] : (images && images.length > 0) ? images[0] : null;
    const imgH = 65;
    const imgW = CW;

    if (img) {
      try {
        doc.addImage(img, 'JPEG', M, sy, imgW, imgH);
        doc.setDrawColor(200, 200, 220);
        doc.setLineWidth(0.3);
        doc.rect(M, sy, imgW, imgH);
        doc.setTextColor(...GRAY);
        doc.setFontSize(7.5);
        doc.setFont('helvetica', 'italic');
        doc.text('Fig: ' + (sec.imageQuery || sec.title), M + imgW / 2, sy + imgH + 4, { align: 'center' });
        sy += imgH + 8;
      } catch { sy += 5; }
    }

    // Text flows FULL WIDTH below image
    const textW = CW;
    doc.setTextColor(...DARK);
    doc.setFontSize(10.5);
    doc.setFont('helvetica', 'normal');
    const secLines = doc.splitTextToSize(sec.content, textW);
    const leftColLines = secLines.slice(0, Math.floor((imgH + 10) / 5.4));
    doc.text(leftColLines, M, sy);

    // Rest of text full width below image
    const belowY = sy + imgH + 8;
    const remainLines = secLines.slice(leftColLines.length);
    if (remainLines.length > 0) {
      doc.setTextColor(...DARK);
      doc.text(remainLines.slice(0, 25), M, belowY);
    }

    addFooter(doc, i + 2, content.correctedTitle, W, H, M, PURPLE);
  }

  // ── Last page: Key Facts + Conclusion ─────────────────────────────────────
  doc.addPage();
  let fy = M;

  // Top strip
  doc.setFillColor(...PURPLE);
  doc.rect(0, 0, W, 12, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text(content.correctedTitle.toUpperCase(), M, 8);
  doc.text(`Page ${content.sections.length + 2}`, W - M, 8, { align: 'right' });

  fy = 22;

  // Key facts box
  fy = drawSectionHeading(doc, 'KEY FACTS', fy, M, CW, PURPLE);

  // Key Facts as cards (2 per row)
  const cardW = (CW - 6) / 2;
  const cardH = 22;
  const icons = ['★', '✦', '◆', '●', '▲', '■'];
  
  content.keyFacts.forEach((fact, idx) => {
    const col = idx % 2;
    const row = Math.floor(idx / 2);
    const cx = M + col * (cardW + 6);
    const cy = fy + row * (cardH + 4);
    
    // Card background
    doc.setFillColor(240, 240, 255);
    doc.roundedRect(cx, cy, cardW, cardH, 3, 3, 'F');
    
    // Left accent bar
    doc.setFillColor(...PURPLE);
    doc.rect(cx, cy, 4, cardH, 'F');
    
    // Icon
    doc.setTextColor(...PURPLE);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text(icons[idx] || '★', cx + 8, cy + 8);
    
    // Fact text
    doc.setTextColor(...DARK);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    const fl = doc.splitTextToSize(fact, cardW - 14);
    doc.text(fl.slice(0, 2), cx + 8, cy + 14);
  });
  
  fy += Math.ceil(content.keyFacts.length / 2) * (cardH + 4) + 6;

  fy += 10;

  // Conclusion
  fy = drawSectionHeading(doc, 'CONCLUSION', fy, M, CW, PURPLE);

  doc.setTextColor(...DARK);
  doc.setFontSize(10.5);
  doc.setFont('helvetica', 'normal');
  const concLines = doc.splitTextToSize(content.conclusion, CW);
  doc.text(concLines.slice(0, 20), M, fy);

  // Final footer
  addFooter(doc, content.sections.length + 2, content.correctedTitle, W, H, M, PURPLE);

  return doc;
}

function drawSectionHeading(doc, text, y, M, CW, PURPLE) {
  doc.setTextColor(...PURPLE);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text(text, M, y);
  y += 4;
  doc.setDrawColor(...PURPLE);
  doc.setLineWidth(0.8);
  doc.line(M, y, M + CW, y);
  return y + 8;
}

function addFooter(doc, pageNum, title, W, H, M, PURPLE) {
  doc.setFillColor(245, 245, 250);
  doc.rect(0, H - 11, W, 11, 'F');
  doc.setDrawColor(...PURPLE);
  doc.setLineWidth(0.3);
  doc.line(M, H - 11, W - M, H - 11);
  doc.setTextColor(130, 130, 160);
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'normal');
  doc.text('✨ Magic PDF Pro  •  ' + title, M, H - 4);
  doc.text('Page ' + pageNum, W - M, H - 4, { align: 'right' });
}

// ─── Download (mobile Chrome compatible) ─────────────────────────────────────
function downloadPDF() {
  if (!pdfDoc) return;
  const name = correctedTitle.replace(/[^a-zA-Z0-9 ]/g, '').replace(/ /g, '_') || 'document';
  try {
    // Generate PDF as blob
    const blob = pdfDoc.output('blob');
    const url = URL.createObjectURL(blob);
    // Create hidden link and click it — works on Android Chrome
    const a = document.createElement('a');
    a.href = url;
    a.download = name + '.pdf';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    // Cleanup
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 2000);
  } catch(e) {
    // Fallback: open in new tab (user can long-press → save)
    const dataUri = pdfDoc.output('datauristring');
    window.open(dataUri, '_blank');
  }
}

// ─── Preview ──────────────────────────────────────────────────────────────────
function showPreview(content) {
  const pCard = document.getElementById('previewCard');
  pCard.querySelector('.preview-title').textContent =
    `Live Preview: ${content.correctedTitle} (${content.sections.length + 2} Pages Generated)`;

  let html = `<p>${content.introduction.substring(0, 350)}...</p>`;
  content.sections.slice(0, 3).forEach(s => {
    html += `<h3>${s.title}</h3><p>${s.content.substring(0, 220)}...</p>`;
  });
  pCard.querySelector('.preview-content').innerHTML = html;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function resetUI() {
  document.getElementById('downloadSection').style.display = 'none';
  document.getElementById('progressSection').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('timerDisplay').textContent = '0s';
  document.getElementById('previewCard').querySelector('.preview-content').innerHTML =
    '<p class="placeholder-text">Your live generated full page document content will show up here after processing...</p>';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
</script>
</body>
</html>
